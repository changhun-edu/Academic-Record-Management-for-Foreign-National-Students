// WizardTab 외부 정의 — 내부 정의 시 매 렌더마다 리마운트되어 포커스 손실
function RadioGroup({ name, value, onChange, options }) {
  return (
    <div className="flex flex-col sm:flex-row gap-2 sm:gap-3">
      {options.map(o => (
        <label key={o.value} className={`flex items-center gap-2 cursor-pointer px-4 py-2.5 rounded-lg border text-sm transition-all
          ${value === o.value ? "bg-indigo-50 border-indigo-400 text-indigo-800 font-semibold" : "bg-gray-50 border-gray-200 hover:bg-gray-100"}`}>
          <input type="radio" name={name} value={o.value} checked={value === o.value} onChange={() => onChange(o.value)} className="accent-indigo-600 flex-shrink-0" />
          {o.label}
        </label>
      ))}
    </div>
  );
}

function WizardTab() {
  const [q1, setQ1] = useState(null);
  const [q2, setQ2] = useState(null);

  const result = (() => {
    if (q1 === "yes") return { title: "편입학 (또는 재입학/전입학)", desc: "국내 학교에 다녔던 학적 이력이 존재하므로, 원칙적으로 기존 학적을 이어받는 편입학 또는 학업중단 상태에 따른 재입학 절차를 밟아야 합니다. 이전 국내 학교의 학교생활기록부를 나이스 전송 및 확인 요청하여 처리하십시오." };
    if (q1 === "no" && q2 === "yes") return { title: "신입학 (입학)", desc: "대한민국 초등학교 1학년 신입생 정시 모집 시점에 처음 입교하는 형태입니다. 학적 용어는 '입학'에 해당하며, 당해 학년도 법정 수업일수의 2/3 이상 남은 시점이어야 원활합니다." };
    if (q1 === "no" && q2 === "no") return { title: "취학 (정원외 취학)", desc: "국내 학교 이력이 전혀 없고 1학년 신입학 시기가 지난 상태에서 처음으로 국내 학교에 들어오는 경우는 '취학'에 해당합니다. (※ 다른 학교에서 전근 오는 '전입학'과 구별됨에 주의하세요!)" };
    return null;
  })();

  return (
    <div className="bg-white p-4 sm:p-6 rounded-xl border border-gray-200 shadow-sm space-y-5">
      <h3 className="text-sm sm:text-base font-bold text-indigo-900 flex items-center gap-2"><Wand2 size={15} />질문에 답하며 학생의 입교 유형을 확인하세요</h3>
      <div className="border-b pb-5">
        <p className="font-semibold text-gray-700 text-sm mb-3">1. 학생이 국내 초등학교에 입학했거나 다녔던 이력이 있습니까?</p>
        <RadioGroup name="q1" value={q1} onChange={v => { setQ1(v); setQ2(null); }} options={[
          { value: "yes", label: "예 (국내 이력 있음)" },
          { value: "no",  label: "아니오 (국내 이력 전혀 없음)" },
        ]} />
      </div>
      {q1 === "no" && (
        <div className="border-b pb-5">
          <p className="font-semibold text-gray-700 text-sm mb-3">2. 당해 학년도(3월)에 초등학교 1학년 신입생으로 처음 입학하는 경우입니까?</p>
          <RadioGroup name="q2" value={q2} onChange={setQ2} options={[
            { value: "yes", label: "예 (1학년 신입생 입학 기간)" },
            { value: "no",  label: "아니오 (학기 도중 입교 또는 다른 학년 연령)" },
          ]} />
        </div>
      )}
      {result && (
        <div className="p-5 bg-indigo-50 border border-indigo-200 rounded-xl">
          <span className="text-xs uppercase font-bold tracking-wider text-indigo-500">판별된 학적 용어</span>
          <h4 className="text-xl font-black text-indigo-900 mt-1 mb-2">{result.title}</h4>
          <p className="text-sm text-indigo-700 leading-relaxed">{result.desc}</p>
        </div>
      )}
    </div>
  );
}

function ChecklistTab() {
  const [type, setType] = useState("general");
  const [checked, setChecked] = useState({});

  useEffect(() => setChecked({}), [type]);

  const toggle = (i) => setChecked(p => ({ ...p, [i]: !p[i] }));
  const items = CHECKLIST_DATA[type];
  const doneCount = Object.values(checked).filter(Boolean).length;

  return (
    <div className="bg-white p-4 sm:p-6 rounded-xl border border-gray-200 shadow-sm">
      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-4">
        <h3 className="text-sm sm:text-base font-bold text-gray-800">💡 학생 신분별 제출 서류 확인</h3>
        <select value={type} onChange={e => setType(e.target.value)}
          className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:ring-indigo-500 focus:border-indigo-500 outline-none w-full sm:w-auto">
          <option value="general">일반 외국인 등록 아동</option>
          <option value="unregistered">미등록 이주 아동 (외국인등록증 없음)</option>
        </select>
      </div>
      <div className="flex items-center gap-2 mb-4">
        <div className="h-2 flex-1 bg-gray-200 rounded-full overflow-hidden">
          <div className="h-full bg-indigo-500 rounded-full transition-all" style={{ width: `${(doneCount / items.length) * 100}%` }} />
        </div>
        <span className="text-xs text-gray-500 font-medium">{doneCount}/{items.length}</span>
      </div>
      <p className="text-xs text-gray-400 mb-3">* 국내외 발행 서류는 원본 대조가 원칙입니다.</p>
      <div className="space-y-2">
        {items.map((item, i) => (
          <label key={i} onClick={() => toggle(i)}
            className={`flex items-start p-3 rounded-lg border cursor-pointer transition-all
              ${checked[i] ? "bg-green-50 border-green-300" : "bg-gray-50 border-gray-200 hover:bg-gray-100"}`}>
            <div className={`w-5 h-5 rounded border-2 flex items-center justify-center mt-0.5 mr-3 flex-shrink-0 transition-all
              ${checked[i] ? "bg-green-500 border-green-500" : "border-gray-300"}`}>
              {checked[i] && <span className="text-white text-xs font-bold">✓</span>}
            </div>
            <div>
              <p className={`font-semibold text-sm ${checked[i] ? "text-green-800 line-through" : "text-gray-800"}`}>{item.name}</p>
              <p className="text-xs text-gray-500 mt-0.5">{item.desc}</p>
            </div>
          </label>
        ))}
      </div>
      {doneCount === items.length && (
        <div className="mt-4 p-3 bg-green-50 border border-green-200 rounded-lg text-sm text-green-800 font-semibold text-center">
          ✅ 모든 서류 확인 완료!
        </div>
      )}
    </div>
  );
}

// 외국학제 → 한국학제 환산 데이터
// 각 학제별: [초등 연한(년), 중학 연한(년), 고등 연한(년)]
// 교육연한(학기) = 연한 × 2
const FOREIGN_SYSTEMS = [
  {
    id: "5-3-4",
    label: "5 - 3 - 4 - 4제",
    desc: "미국·영국·호주 등",
    elem: 5, mid: 3, high: 4,
    note: "대표적인 영미권 학제",
  },
  {
    id: "6-4-3",
    label: "6 - 4 - 3 - 3제",
    desc: "일본·중국·동남아 일부",
    elem: 6, mid: 4, high: 3,
    note: "일본·중국이 대표적",
  },
  {
    id: "6-3-2",
    label: "6 - 3 - 2 - 5제",
    desc: "러시아·중앙아시아 등",
    elem: 6, mid: 3, high: 2,
    note: "구소련권 국가 학제",
  },
  {
    id: "2-4-3-4",
    label: "2 - 4 - 3 - 4 - 3제",
    desc: "일부 아프리카·중동",
    elem: 6, mid: 3, high: 4,  // 초등 2+4=6년으로 통합
    note: "초등이 2+4년 구조",
  },
  {
    id: "8-4",
    label: "8 - 4 - 4제",
    desc: "일부 유럽·아프리카",
    elem: 8, mid: 0, high: 4,  // 초등 8년 (중·고 통합 4년)
    note: "초등이 8년으로 긴 학제",
  },
];

// 한국학제: 초등 12학기(6년), 중학 6학기(3년), 고등 6학기(3년)
const KR = { elemSem: 12, midSem: 6, highSem: 6 };

function semToGradeInfo(completedSem) {
  // 어느 교급·학년에 해당하는지 반환
  if (completedSem < KR.elemSem) {
    const grade = Math.floor(completedSem / 2) + 1;
    return { school: "초등학교", grade: Math.min(grade, 6), sem: completedSem };
  }
  const afterElem = completedSem - KR.elemSem;
  if (afterElem < KR.midSem) {
    const grade = Math.floor(afterElem / 2) + 1;
    return { school: "중학교", grade: Math.min(grade, 3), sem: completedSem };
  }
  const afterMid = afterElem - KR.midSem;
  if (afterMid < KR.highSem) {
    const grade = Math.floor(afterMid / 2) + 1;
    return { school: "고등학교", grade: Math.min(grade, 3), sem: completedSem };
  }
  return { school: "고등학교 졸업 이상", grade: null, sem: completedSem };
}

// 환산표 데이터 — CalculatorTab 외부 상수
const TABLE_ROWS = [
  { label: "5 - 3 - 4 - 4제", elem: "5년", mid: "3년", high: "4년",          ex: "미국·영국·호주" },
  { label: "6 - 4 - 3 - 3제", elem: "6년", mid: "4년", high: "3년",          ex: "일본·중국" },
  { label: "6 - 3 - 2 - 5제", elem: "6년", mid: "3년", high: "2년",          ex: "러시아·중앙아" },
  { label: "2-4-3-4-3제",      elem: "6년(2+4)", mid: "3년", high: "4년",   ex: "아프리카·중동 일부" },
  { label: "8 - 4 - 4제",      elem: "8년", mid: "—",  high: "4년(중·고통합)", ex: "유럽·아프리카 일부" },
];
const KR_ROW = { label: "한국학제 (기준)", elem: "6년(12학기)", mid: "3년(6학기)", high: "3년(6학기)" };

function CalculatorTab() {
  const [mode, setMode] = useState("doc");   // "doc" | "nodoc"
  const [sysId, setSysId] = useState("5-3-4");
  const [sems, setSems] = useState("");
  const [birth, setBirth] = useState("");
  const [result, setResult] = useState(null);
  const [showTable, setShowTable] = useState(false);

  const selectedSys = FOREIGN_SYSTEMS.find(s => s.id === sysId);

  const calculate = () => {
    const n = parseInt(sems);
    if (isNaN(n) || n < 0) { alert("이수 학기 수를 올바르게 입력해주세요."); return; }

    // 해당 학제에서 이수한 학기를 한국학제 학기로 환산
    const sys = selectedSys;
    // 각 교급별 학기
    const elemSemForeign = sys.elem * 2;
    const midSemForeign  = sys.mid  * 2;

    let krSem = 0;
    if (n <= elemSemForeign) {
      // 초등 범위: 외국 초등 학기 → 한국 초등 비율 환산
      krSem = Math.round((n / (sys.elem * 2)) * KR.elemSem);
    } else if (n <= elemSemForeign + midSemForeign) {
      // 중학 범위
      const midDone = n - elemSemForeign;
      const midSemForeignTotal = sys.mid * 2 || 1;
      krSem = KR.elemSem + Math.round((midDone / midSemForeignTotal) * KR.midSem);
    } else {
      // 고등 범위
      const highDone = n - elemSemForeign - midSemForeign;
      const highSemForeignTotal = sys.high * 2 || 1;
      krSem = KR.elemSem + KR.midSem + Math.round((highDone / (highSemForeignTotal)) * KR.highSem);
    }

    const info = semToGradeInfo(krSem);

    // 1학기 부족 판정 (초·중학교, 외국→국내 공백 없는 경우 적용 가능)
    const shortOneSem = (krSem % 2 === 1); // 홀수 학기 = 정확히 반 학기 부족
    const flexApplicable = (info.school === "초등학교" || info.school === "중학교");

    // 연령 기준 (참고용)
    let ageInfo = null;
    if (birth) {
      const age = 2026 - new Date(birth).getFullYear();
      const ageGrade = Math.min(Math.max(age - 6, 1), 6);
      ageInfo = { age, ageGrade };
    }

    setResult({ info, krSem, n, shortOneSem, flexApplicable, ageInfo, sys });
  };

  const reset = () => { setSems(""); setBirth(""); setResult(null); };

  return (
    <div className="space-y-4">
      {/* 모드 선택 */}
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <button onClick={() => { setMode("doc"); setResult(null); }}
          className={`p-4 rounded-xl border-2 text-left transition-all ${mode === "doc"
            ? "border-indigo-500 bg-indigo-50"
            : "border-gray-200 bg-white hover:border-gray-300"}`}>
          <div className={`text-sm font-bold mb-1 ${mode === "doc" ? "text-indigo-800" : "text-gray-700"}`}>
            📄 학력증빙서류가 있는 경우
          </div>
          <p className="text-xs text-gray-500">재학증명서·성적증명서로 외국 학제 기반 학년 산정</p>
        </button>
        <button onClick={() => { setMode("nodoc"); setResult(null); }}
          className={`p-4 rounded-xl border-2 text-left transition-all ${mode === "nodoc"
            ? "border-orange-500 bg-orange-50"
            : "border-gray-200 bg-white hover:border-gray-300"}`}>
          <div className={`text-sm font-bold mb-1 ${mode === "nodoc" ? "text-orange-800" : "text-gray-700"}`}>
            ❓ 학력 증명이 곤란한 경우
          </div>
          <p className="text-xs text-gray-500">시도교육청 학력심의위원회 통한 학력 인정 및 학년 결정</p>
        </button>
      </div>

      {/* 학력 증명 곤란 안내 */}
      {mode === "nodoc" && (
        <div className="bg-orange-50 border border-orange-200 rounded-xl p-5 space-y-3">
          <h4 className="font-bold text-orange-800 text-sm flex items-center gap-2">
            <AlertCircle size={15} />학력 증명이 곤란한 경우 처리 절차
          </h4>
          <div className="space-y-2 text-xs text-orange-800">
            <div className="bg-white/70 rounded-lg p-3 border border-orange-200">
              <p className="font-semibold mb-1">① 시도교육청 학력심의위원회 심의</p>
              <p className="text-orange-700">학력증빙서류를 제출하지 못하는 경우, 시도교육청별 학력심의위원회에서 학력 인정 및 학년 결정 (각 시도교육청별 상이하므로 교육청에 문의)</p>
            </div>
            <div className="bg-white/70 rounded-lg p-3 border border-orange-200">
              <p className="font-semibold mb-1">② 학교 자체 학력인정 심의</p>
              <p className="text-orange-700">학력증빙서류 없이도 학력인정이 가능한 학교의 경우 해당 학교 학력 심의를 통해 학력 인정 및 학년 결정</p>
            </div>
            <div className="bg-amber-100 rounded-lg p-3 border border-amber-300 mt-1">
              <p className="font-semibold text-amber-800">📌 유의사항</p>
              <p className="text-amber-700 mt-0.5">사이버학습, 가정 내 학습 기간 중 국내에서 1개월 이상 거주하거나 해당 기간의 성적을 증명할 수 없는 경우에는 외국 학교 교육기간으로 인정하지 않습니다.</p>
            </div>
          </div>
        </div>
      )}

      {/* 학력증빙서류 있는 경우 계산기 */}
      {mode === "doc" && (
        <>
          {/* 외국학제 환산표 토글 */}
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <button onClick={() => setShowTable(t => !t)}
              className="w-full flex justify-between items-center px-5 py-3.5 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
              <span>📊 외국학제 → 한국학제 환산표</span>
              <span className="text-gray-400 text-xs">{showTable ? "▲ 접기" : "▼ 펼쳐보기"}</span>
            </button>
            {showTable && (
              <div className="px-4 pb-4 overflow-x-auto -mx-1">
                <div className="min-w-[480px]">
                <table className="w-full text-xs border-collapse">
                  <thead>
                    <tr className="bg-indigo-50">
                      <th className="border border-gray-200 px-3 py-2 text-left text-gray-700 font-semibold">학제</th>
                      <th className="border border-gray-200 px-3 py-2 text-center text-indigo-700 font-semibold">초등</th>
                      <th className="border border-gray-200 px-3 py-2 text-center text-green-700 font-semibold">중학</th>

                      <td className="border border-gray-200 px-3 py-2 text-center text-green-700">{KR_ROW.mid}</td>
                      <td className="border border-gray-200 px-3 py-2 text-center text-purple-700">{KR_ROW.high}</td>
                      <td className="border border-gray-200 px-3 py-2 text-gray-400">—</td>
                    </tr>
                    {TABLE_ROWS.map((r, i) => (
                      <tr key={i} className="hover:bg-blue-50">
                        <td className="border border-gray-200 px-3 py-2 font-medium text-gray-800">{r.label}</td>
                        <td className="border border-gray-200 px-3 py-2 text-center text-indigo-600">{r.elem}</td>
                        <td className="border border-gray-200 px-3 py-2 text-center text-green-600">{r.mid}</td>
                        <td className="border border-gray-200 px-3 py-2 text-center text-purple-600">{r.high}</td>
                        <td className="border border-gray-200 px-3 py-2 text-gray-500">{r.ex}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <p className="text-xs text-gray-400 mt-2">※ 외국학교 재학증명서·성적증명서를 근거로 한국학제(12학년제)에 맞춰 계산합니다.</p>
                </div>
              </div>
            )}
          </div>

          {/* 입력 폼 */}
          <div className="bg-white p-4 sm:p-5 rounded-xl border border-gray-200 shadow-sm">
            <h3 className="text-xs sm:text-sm font-bold text-gray-800 mb-4 flex items-center gap-2">
              <Calculator size={14} className="text-indigo-600" />학년 산정 계산기

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">

                    <div className="space-y-1.5 text-xs text-gray-600">
                      <p>• 외국 이수: <strong>{result.n}학기</strong>

                      {result.ageInfo && (

              <p>• <strong>인정 대상:</strong> 국내가 아닌 <strong>외국에 소재하는 학교</strong> (국내 소재 외국인 학교 제외)</p>
              <p>• <strong>인정 기준:</strong> 우리나라 학제(학기 단위)에 따른 교급별 교육과정상 교육 연한</p>
              <p>• <strong>최소 이수:</strong> 외국 정규학교 이수기간은 최소 6개월(한 학기) 이상인 경우에 인정</p>
              <p>• <strong>졸업학력:</strong> 사이버학습·가정 내 학습은 국내 1개월 이상 거주하거나 성적 증명 불가 시 제외</p>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function ApostilleTab() {
  const [country, setCountry] = useState("");
  const [status, setStatus] = useState("idle"); // idle | loading | done | error
  const [result, setResult] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");
  const [history, setHistory] = useState([]);

  const doSearch = useCallback(async (query) => {
    if (!query.trim()) return;
    setStatus("loading");
    setResult(null);
    setErrorMsg("");

    try {
      const resp = await fetch("/api/apostille", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          country: query
        })
      });

      const data = await resp.json().catch(() => null);
      if (!resp.ok) throw new Error(data?.error || `HTTP ${resp.status}`);
      const info = data?.result;
      if (!info) throw new Error("조회 결과가 비어 있습니다.");

      setResult(info);
      setStatus("done");

      const label = info.country_ko || query;
      setHistory(h => [label, ...h.filter(x => x !== label)].slice(0, 8));
    } catch (e) {
      setErrorMsg(e.message || "알 수 없는 오류");
      setStatus("error");
    }
  }, []);

  const handleSubmit = () => doSearch(country);

  return (
    <>
      {/* 개요 배너 */}
      <div className="bg-gradient-to-r from-rose-600 to-orange-500 rounded-2xl p-4 sm:p-5 text-white shadow-md">
        <h3 className="text-base sm:text-lg font-bold mb-1 flex items-center gap-2"><Stamp size={17} />아포스티유 협약국 실시간 확인</h3>
        <p className="text-rose-100 text-xs sm:text-sm leading-relaxed">
          협약 가입국은 매년 변동됩니다. 국가명을 입력하면 AI가 HCCH 공식 데이터를 웹 검색하여
          <strong> 방법 2(아포스티유)</strong> 또는 <strong>방법 3(영사확인)</strong> 여부를 안내합니다.
        </p>
      </div>

      {/* 흐름도 */}
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4 sm:p-5">
        <h4 className="font-bold text-gray-700 mb-3 text-xs sm:text-sm">📋 외국 학력서류 인증 흐름</h4>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 text-xs">
          {[
            { color: "blue",   badge: "방법 1", title: "교육부 홈페이지",     sub: "학력인정학교 목록" },
            { color: "rose",   badge: "방법 2", title: "아포스티유 (협약국)", sub: "권한기관 아포스티유" },
            { color: "amber",  badge: "방법 3", title: "영사확인 (미가입국)", sub: "재외공관 영사 인증" },
            { color: "gray",   badge: "방법 4", title: "직접 소명",           sub: "정규교육기관 소명" },
          ].map(({ color, badge, title, sub }) => (
            <div key={badge} className={`bg-${color}-50 border border-${color}-200 rounded-lg p-2.5 text-center`}>
              <span className={`inline-block bg-${color}-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded mb-1`}>{badge}</span>
              <p className={`font-semibold text-${color}-800 text-[11px] sm:text-xs leading-snug`}>{title}</p>
              <p className={`text-${color}-500 text-[10px] mt-0.5 hidden sm:block`}>{sub}</p>
            </div>
          ))}
        </div>
      </div>

      {/* 검색 카드 */}
      <div className="bg-white p-4 sm:p-6 rounded-xl border border-gray-200 shadow-sm">
        <h3 className="text-sm sm:text-base font-bold mb-1 text-gray-800 flex items-center gap-2"><Search size={15} />국가별 협약 가입 여부 실시간 조회</h3>
        <p className="text-xs text-gray-400 mb-4">한국어 또는 영어 국가명을 입력하세요.</p>

        <div className="flex gap-2 mb-3">
          <input
            type="text"
            value={country}
            onChange={e => setCountry(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleSubmit()}
            placeholder="예: 베트남, 중국, 몽골, Bangladesh..."
            className="flex-1 border border-gray-300 rounded-lg px-3 sm:px-4 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-rose-400 outline-none min-w-0"
          />
          <button
            onClick={handleSubmit}
            disabled={status === "loading"}
            className="bg-rose-600 text-white px-4 sm:px-5 py-2.5 rounded-lg font-semibold hover:bg-rose-700 active:scale-95 transition-all text-sm shadow-sm flex items-center gap-1.5 disabled:opacity-60 whitespace-nowrap flex-shrink-0"
          >
            {status === "loading"
              ? <><Loader2 size={14} className="animate-spin" /><span className="hidden sm:inline">조회 중</span></>
              : <><Search size={14} /><span className="hidden sm:inline">조회하기</span><span className="sm:hidden">조회</span></>}
          </button>
        </div>

        {/* 최근 조회 기록 */}
        {history.length > 0 && (
          <div className="flex flex-wrap gap-2 mb-4">
            {history.map(h => (
              <button key={h} onClick={() => { setCountry(h); doSearch(h); }}
                className="text-xs bg-gray-100 hover:bg-rose-100 hover:text-rose-700 text-gray-600 px-3 py-1 rounded-full border transition-colors">
                {h}
              </button>
            ))}
          </div>
        )}

        {/* 로딩 */}
        {status === "loading" && (
          <div className="text-center py-10 text-gray-400">
            <Loader2 size={36} className="mx-auto mb-3 animate-spin text-rose-400" />
            <p className="text-sm">AI가 헤이그 협약 최신 정보를 웹 검색 중입니다...</p>
          </div>
        )}

        {/* 에러 */}
        {status === "error" && (
          <div className="p-4 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 flex items-center gap-2">
            <AlertCircle size={16} className="flex-shrink-0" />
            조회 중 오류가 발생했습니다: {errorMsg}
          </div>
        )}

        {/* 결과 */}
        {status === "done" && result && <ApostilleResult info={result} />}
      </div>

      {/* 확인서 양식 안내 */}
      <div className="bg-white p-4 sm:p-5 rounded-xl border border-gray-200 shadow-sm">
        <h4 className="font-bold text-gray-800 mb-3 text-xs sm:text-sm flex items-center gap-2">
          <FileText size={13} className="text-rose-500" />아포스티유 확인서 주요 기재사항
        </h4>
        <div className="grid grid-cols-3 gap-1.5 sm:gap-2 text-xs">
          {APOSTILLE_ITEMS.map(({ num, label }) => (
            <div key={num} className="bg-gray-50 rounded-lg p-2.5 border flex items-center gap-2">
              <span className="w-5 h-5 bg-rose-100 text-rose-700 rounded-full flex items-center justify-center font-bold text-[10px] flex-shrink-0">{num}</span>
              <span className="text-gray-700 font-medium">{label}</span>
            </div>
          ))}
        </div>
        <p className="text-xs text-gray-400 mt-3">※ 아포스티유는 원칙적으로 문서 '원문' 대상. 번역문은 공증사무소 '공증' 후 권한기관에 별도 아포스티유 신청 필요.</p>
        <div className="mt-2 flex gap-4">
          <a href="https://www.apostille.go.kr" target="_blank" rel="noreferrer" className="text-xs text-rose-600 hover:underline flex items-center gap-1">
            <ExternalLink size={11} />외교부 아포스티유 홈페이지
          </a>
          <a href="https://www.oka.go.kr" target="_blank" rel="noreferrer" className="text-xs text-blue-600 hover:underline flex items-center gap-1">
            <ExternalLink size={11} />재외동포청 홈페이지
          </a>
        </div>
      </div>
    </>
  );
}

function ApostilleResult({ info }) {
  const ok = info.is_member;
  return (
    <div className={`rounded-xl border p-4 sm:p-5 ${ok ? "bg-emerald-50 border-emerald-300" : "bg-amber-50 border-amber-300"}`}>
      {/* 헤더 */}
      <div className="flex items-center gap-2.5 sm:gap-3 mb-3">
        {ok
          ? <CheckCircle2 size={28} className="text-emerald-500 flex-shrink-0" />
          : <XCircle     size={28} className="text-amber-500 flex-shrink-0" />}
        <div className="min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <h4 className={`text-lg sm:text-xl font-black ${ok ? "text-emerald-800" : "text-amber-800"} truncate`}>{info.country_ko || "—"}</h4>
            {info.country_en && <span className="text-xs sm:text-sm text-gray-500">({info.country_en})</span>}
          </div>
          <span className={`inline-block mt-1 px-2.5 py-0.5 rounded-full text-xs sm:text-sm font-bold ${ok ? "bg-emerald-100 text-emerald-800" : "bg-amber-100 text-amber-800"}`}>
            {ok ? "✅ 아포스티유 협약 가입국" : "❌ 아포스티유 협약 미가입국"}
          </span>
        </div>
      </div>

      {/* 상세 정보 */}
      <div className="flex flex-wrap gap-x-6 gap-y-1 text-xs text-gray-600 mb-3">
        {info.join_date   && <span><strong>가입일:</strong> {info.join_date}</span>}
        {info.authority   && <span><strong>권한기관:</strong> {info.authority}</span>}
        {info.search_date && <span><strong>조회 기준일:</strong> {info.search_date}</span>}
      </div>
      {info.note && (
        <div className="bg-white/60 border rounded p-2 text-xs text-gray-700 mb-3">⚠️ {info.note}</div>
      )}

      {/* 처리 방법 */}
      {ok ? (
        <div className="bg-emerald-100 border border-emerald-200 rounded-lg p-4">
          <span className="bg-emerald-700 text-white text-xs font-bold px-2 py-0.5 rounded inline-block mb-2">[방법 2] 아포스티유 인증</span>
          <ul className="text-xs text-emerald-800 space-y-1 list-disc list-inside">
            <li>해당 국가의 권한기관에서 <strong>아포스티유가 부착된 서류</strong>를 발급받아 제출</li>
            <li>번역문이 필요한 경우 공증사무소 '공증' 후 별도로 아포스티유 신청</li>
            <li>협약국 권한기관 확인: apostille.go.kr → [서비스 안내] → [아포스티유 제도 소개] → '가입국 현황'</li>
          </ul>
        </div>
      ) : (
        <div className="bg-amber-100 border border-amber-200 rounded-lg p-4">
          <span className="bg-amber-700 text-white text-xs font-bold px-2 py-0.5 rounded inline-block mb-2">[방법 3] 영사확인 (Legalization)</span>
          <ul className="text-xs text-amber-800 space-y-1 list-disc list-inside">
            <li>아포스티유 협약 미가입국이므로 <strong>대한민국 재외공관 영사의 인증</strong>이 필요</li>
            <li>해당 국가 내 대한민국 대사관·영사관에서 문서 영사확인 신청</li>
            <li>문의: 외교부(mofa.go.kr) 또는 해당국 주재 한국 대사관</li>
          </ul>
        </div>
      )}

      <p className="text-xs text-gray-400 mt-3 text-right">
        * AI 웹검색 결과입니다. 최종 확인은 apostille.go.kr 또는 관할 교육청에서 하시기 바랍니다.
      </p>
    </div>
  );
}

const CAT_COLORS = {
  violet:  { bg: "bg-violet-100",  text: "text-violet-700",  border: "border-violet-200",  badge: "bg-violet-600"  },
  sky:     { bg: "bg-sky-100",     text: "text-sky-700",     border: "border-sky-200",     badge: "bg-sky-600"     },
  emerald: { bg: "bg-emerald-100", text: "text-emerald-700", border: "border-emerald-200", badge: "bg-emerald-600" },
  amber:   { bg: "bg-amber-100",   text: "text-amber-700",   border: "border-amber-200",   badge: "bg-amber-600"   },
  rose:    { bg: "bg-rose-100",    text: "text-rose-700",    border: "border-rose-200",    badge: "bg-rose-600"    },
};

// allItems — QnaTab 외부 상수 (QNA_DATA가 불변이므로 한 번만 계산)
const ALL_QNA_ITEMS = QNA_DATA.flatMap(cat =>
  cat.items.map(item => ({ ...item, cat: cat.cat, color: cat.color }))
);

function QnaTab() {
  const [search, setSearch] = useState("");
  const [activeCat, setActiveCat] = useState("전체");
  const [openKey, setOpenKey] = useState(null); // 안정적 키로 관리 (인덱스 X)

  const cats = ["전체", ...QNA_DATA.map(c => c.cat)];

  const filtered = ALL_QNA_ITEMS.filter(item => {
    const matchCat = activeCat === "전체" || item.cat === activeCat;
    const kw = search.trim().toLowerCase();
    const matchSearch = !kw ||
      item.q.toLowerCase().includes(kw) ||
      item.a.join(" ").toLowerCase().includes(kw) ||
      item.tag.toLowerCase().includes(kw);
    return matchCat && matchSearch;
  });

  const getKey = (item) => `${item.cat}-${item.q.slice(0, 20)}`;
  const toggle = (item) => setOpenKey(prev => prev === getKey(item) ? null : getKey(item));

  return (
    <div className="space-y-4">
      {/* 헤더 */}
      <div className="bg-gradient-to-r from-teal-600 to-cyan-600 rounded-2xl p-4 sm:p-5 text-white shadow-md">
        <h3 className="text-base sm:text-lg font-bold mb-1 flex items-center gap-2">
          <HelpCircle size={17} />자주 묻는 질문 (Q&A)
        </h3>
        <p className="text-teal-100 text-xs sm:text-sm">외국 국적 학생 학적 관리 현장에서 자주 발생하는 질문 35개를 5개 카테고리로 정리했습니다.</p>
      </div>

      {/* 검색 + 필터 */}
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-3 sm:p-4 space-y-3">
        <div className="relative">
          <Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
          <input
            type="text"
            value={search}
            onChange={e => { setSearch(e.target.value); setOpenKey(null); }}
            placeholder="질문 또는 키워드 검색... (예: 취학, 편입학, 나이스, 예방접종)"
            className="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-teal-400 focus:border-teal-400 outline-none"
          />
          {search && (
            <button onClick={() => { setSearch(""); setOpenKey(null); }} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <XCircle size={15} />
            </button>
          )}
        </div>
        <div className="flex flex-wrap gap-2">
          {cats.map(cat => {
            const catData = QNA_DATA.find(c => c.cat === cat);
            const color = catData ? CAT_COLORS[catData.color] : null;
            const isActive = activeCat === cat;
            return (
              <button key={cat} onClick={() => { setActiveCat(cat); setOpenKey(null); }}
                className={`px-3 py-1 rounded-full text-xs font-semibold border transition-all
                  ${isActive
                    ? color ? `${color.badge} text-white border-transparent` : "bg-gray-700 text-white border-transparent"
                    : "bg-white text-gray-600 border-gray-300 hover:border-gray-400"}`}>
                {cat}
                {cat !== "전체" && (
                  <span className="ml-1 opacity-70">
                    {QNA_DATA.find(c => c.cat === cat)?.items.length}
                  </span>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* 결과 수 */}
      <p className="text-xs text-gray-400 px-1">
        {filtered.length}개 항목 표시 중 (전체 {ALL_QNA_ITEMS.length}개)
      </p>

      {/* Q&A 목록 */}
      {filtered.length === 0 ? (
        <div className="bg-white rounded-xl border border-gray-200 p-10 text-center text-gray-400">
          <HelpCircle size={36} className="mx-auto mb-2 opacity-30" />
          <p className="text-sm">검색 결과가 없습니다. 다른 키워드로 검색해 보세요.</p>
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map((item) => {
            const color = CAT_COLORS[item.color];
            const key = getKey(item);
            const isOpen = openKey === key;
            return (
              <div key={key} className={`bg-white rounded-xl border ${isOpen ? color.border : "border-gray-200"} shadow-sm overflow-hidden transition-all`}>
                <button
                  onClick={() => toggle(item)}
                  className="w-full flex items-start gap-2.5 p-3.5 sm:p-4 text-left hover:bg-gray-50 active:bg-gray-100 transition-colors"
                >
                  <span className={`flex-shrink-0 mt-0.5 px-1.5 py-0.5 rounded text-[9px] sm:text-[10px] font-bold text-white ${color.badge}`}>
                    {item.cat}
                  </span>
                  <span className="flex-1 text-xs sm:text-sm font-semibold text-gray-800 leading-snug">{item.q}</span>
                  <span className={`flex-shrink-0 mt-0.5 ${color.text}`}>
                    {isOpen ? <ChevronUp size={15} /> : <ChevronDown size={15} />}
                  </span>
                </button>

                {isOpen && (
                  <div className={`px-3.5 sm:px-4 pb-3.5 sm:pb-4 border-t ${color.border}`}>
                    <div className={`mt-3 rounded-lg p-3 sm:p-4 ${color.bg} space-y-2`}>
                      {item.a.map((line, i) => (
                        <p key={i} className={`text-xs ${color.text} leading-relaxed ${line.startsWith("※") || line.startsWith("*") ? "opacity-75 italic" : ""}`}>
                          {line}
                        </p>
                      ))}
                    </div>
                    <div className="flex items-center gap-1 mt-2">
                      <Tag size={10} className="text-gray-300" />
                      <span className="text-[10px] text-gray-400">{item.tag}</span>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
