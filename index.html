<!DOCTYPE html>
<html lang="ko">

    /* ── 스크롤 탭바 ── */

</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react,env">

    // ── 인라인 SVG 아이콘 (lucide 대체) ──────────────────
    const Ic = ({ size=16, className="", children }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth="2" strokeLinecap="round"

    const Home = p => <Ic {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Ic>;
    const Wand2 = p => <Ic {...p}><path d="m15 4-8.5 8.5c-.83.83-.83 2.17 0 3 .83.83 2.17.83 3 0L18 7"/><path d="M4 20l3-3"/></Ic>;

    const Calculator = p => <Ic {...p}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="10" x2="8" y2="10"/><line x1="8" y1="14" x2="8" y2="18"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="16" y1="14" x2="16" y2="18"/></Ic>;
    const Stamp = p => <Ic {...p}><path d="M5 22h14"/><path d="M19.27 13.73A2.5 2.5 0 0 0 17.5 13h-11A2.5 2.5 0 0 0 4 15.5V17a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-1.5a2.5 2.5 0 0 0-.73-1.77z"/><path d="M14 13V8.5a2.5 2.5 0 0 0-5 0V13"/></Ic>;

    const CheckCircle2 = p => <Ic {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Ic>;
    const XCircle = p => <Ic {...p}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></Ic>;

    const FolderOpen = p => <Ic {...p}><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h3.93a2 2 0 0 1 1.42.59l.68.68A2 2 0 0 0 11.44 7H18a2 2 0 0 1 2 2v1.4"/></Ic>;
    const ListOrdered = p => <Ic {...p}><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></Ic>;
    const Network = p => <Ic {...p}><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></Ic>;
    const ExternalLink = p => <Ic {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></Ic>;
    const RotateCcw = p => <Ic {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.05"/></Ic>;
    const HelpCircle = p => <Ic {...p}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></Ic>;
    const ChevronDown = p => <Ic {...p}><polyline points="6 9 12 15 18 9"/></Ic>;
    const ChevronUp = p => <Ic {...p}><polyline points="18 15 12 9 6 15"/></Ic>;
    const Tag = p => <Ic {...p}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></Ic>;


// ── 데이터 ────────────────────────────────────────────

    { name: "예방접종증명서", desc: "국내 보건소 발행본 또는 외국 발행 접종기록 원본" },

    { name: "학생 여권 사본 또는 출생증명서", desc: "외국인등록번호가 없으므로 여권번호나 생년월일 증빙 필수" },
    { name: "거주사실 확인 서류 (택 1)", desc: "임대차계약서, 공공요금 영수증, 또는 이웃 2인 이상 인우보증서" },
    { name: "외국학교 서류 (학령 확인용)", desc: "서류가 아예 없는 경우 학력심의위원회 개최하여 학년 결정" },
    { name: "예방접종기록 검토서", desc: "미확인 시 보건소와 연계하여 필수 접종 안내 진행" },
  ],
};

const APOSTILLE_ITEMS = [
  { num: "①", label: "문서발급자 성명" }, { num: "②", label: "발급자 직위" },
  { num: "③", label: "문서발급기관" },   { num: "④", label: "발급장소" },
  { num: "⑤", label: "발급일자" },       { num: "⑥", label: "Apostille 발급기관" },
  { num: "⑦", label: "발급번호" },       { num: "⑧", label: "기관 스탬프" },
  { num: "⑨", label: "담당자 서명" },
];

// ── 탭 정의 ───────────────────────────────────────────
const TABS = [
  { id: "home",       label: "홈 / 대시보드",         Icon: Home },
  { id: "wizard",     label: "입교 유형 판별기",       Icon: Wand2 },
  { id: "checklist",  label: "서류 체크리스트",        Icon: FileText },
  { id: "calculator", label: "학년 배정 계산기",       Icon: Calculator },
  { id: "apostille",  label: "아포스티유 협약국", Icon: Stamp },
  { id: "neis",       label: "나이스(NEIS) 가이드",    Icon: Monitor },
  { id: "qna",        label: "자주 묻는 질문(Q&A)",   Icon: HelpCircle },
];

// ── 사이드바 컴포넌트 (App 외부 정의 — 내부 정의 시 매 렌더마다 리마운트됨) ──
function Sidebar({ mobile, activeTab, onNavigate }) {
  return (
    <aside className={`${mobile ? "w-72" : "w-60"} text-white flex flex-col justify-between h-full`} style={{background:"#1e2d5a"}}>
      <div className="p-5 overflow-y-auto">
        <button onClick={() => onNavigate("home")} className="flex items-center gap-2.5 mb-7 hover:opacity-80 transition-opacity w-full text-left">
          <GraduationCap size={22} className="text-yellow-300 flex-shrink-0" />
          <h1 className="text-sm font-bold tracking-tight leading-snug">외국 국적<br/>학적도우미</h1>
        </button>
        <nav className="space-y-0.5">
          {TABS.map(({ id, label, Icon }) => (
            <button key={id} onClick={() => onNavigate(id)}
              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all
                ${activeTab === id
                  ? "bg-blue-500 text-white shadow-sm"
                  : "text-blue-200 hover:bg-white/10 hover:text-white"}`}>
              <Icon size={15} className="flex-shrink-0 opacity-80" />
              <span className="text-sm">{label}</span>
            </button>
          ))}
        </nav>
      </div>
      <div className="p-4 text-center flex-shrink-0" style={{borderTop:"1px solid rgba(255,255,255,0.08)"}}>
        <p className="text-[12px]" style={{color:"rgba(255,255,255,0.35)"}}>교육부·17개 시도교육청 자료 기반</p>
        <p className="text-[13px] mt-0.5 select-none" style={{color:"rgba(255,255,255,0.15)"}}>만든이 2026 최창훈</p>
      </div>
    </aside>
  );
}

// 탭 타이틀 — App 외부 상수
const TAB_TITLES = {
  home: "홈 / 대시보드",
  wizard: "입교 유형 판별",
  checklist: "서류 체크리스트",
  calculator: "학년 배정 계산기",
  apostille: "아포스티유 협약국",
  neis: "나이스(NEIS) 가이드",
  qna: "자주 묻는 질문",
};

// ╔══════════════════════════════════════════════════════╗
// ║                     메인 앱                          ║
// ╚══════════════════════════════════════════════════════╝
const VALID_TABS = new Set(["home","wizard","checklist","calculator","apostille","neis","qna"]);

function getHashTab() {
  const hash = location.hash.replace("#", "");
  return VALID_TABS.has(hash) ? hash : "home";
}

function App() {
  const [activeTab, setActiveTab] = useState(getHashTab);
  const [drawerOpen, setDrawerOpen] = useState(false);

  // 뒤로가기 / 앞으로가기 감지
  useEffect(() => {
    const onPop = () => {
      setActiveTab(getHashTab());
      setDrawerOpen(false);
    };
    window.addEventListener("popstate", onPop);
    return () => window.removeEventListener("popstate", onPop);
  }, []);

  const navigate = useCallback((id) => {
    if (location.hash !== "#" + id) {
      history.pushState(null, "", "#" + id);
    }
    setActiveTab(id);
    setDrawerOpen(false);
  }, []);

  return (
    <div className="flex h-screen overflow-hidden" style={{background:"#f0f4f8"}}>

      {/* ── 데스크톱 사이드바 (lg 이상) ── */}
      <div className="hidden lg:flex flex-col flex-shrink-0 shadow-xl">
        <Sidebar activeTab={activeTab} onNavigate={navigate} />
      </div>

      {/* ── 모바일 드로어 오버레이 ── */}
      {drawerOpen && (
        <div className="lg:hidden fixed inset-0 z-50 flex">
          <div className="absolute inset-0 bg-black/50" onClick={() => setDrawerOpen(false)} />
          <div className="relative z-10 flex flex-col shadow-2xl">
            <Sidebar mobile activeTab={activeTab} onNavigate={navigate} />
          </div>
          <button
            onClick={() => setDrawerOpen(false)}
            className="absolute top-4 right-4 z-20 w-9 h-9 bg-white/20 rounded-full flex items-center justify-center text-white hover:bg-white/30 transition-colors"
          >
            <XCircle size={20} />
          </button>
        </div>
      )}

      {/* ── 본문 ── */}
      <div className="flex-1 flex flex-col overflow-hidden min-w-0">

        {/* 헤더 */}
        <header className="bg-white border-b border-gray-200 px-4 sm:px-6 flex items-center gap-3 flex-shrink-0" style={{minHeight:"52px"}}>
          <button
            onClick={() => setDrawerOpen(true)}
            className="lg:hidden flex-shrink-0 flex items-center justify-center w-8 h-8 text-gray-500 hover:text-gray-800 transition-colors"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
              <line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <div className="lg:hidden flex items-center gap-1.5 flex-shrink-0">
            <GraduationCap size={15} className="text-yellow-500" />
            <span className="text-sm font-bold text-blue-900 whitespace-nowrap">학적도우미</span>
            <span className="text-gray-300 text-sm mx-1">|</span>
          </div>
          <div className="flex items-center gap-2 min-w-0 flex-1">
            <h2 className="text-sm font-bold text-gray-800 truncate">{TAB_TITLES[activeTab]}</h2>
            <span className="hidden sm:inline bg-amber-100 text-amber-700 text-[12px] px-2 py-0.5 rounded-full font-bold whitespace-nowrap flex-shrink-0">초등 전용</span>
          </div>
        </header>

        {/* 메인 콘텐츠 */}
        <main className="flex-1 overflow-y-auto px-3 py-5 sm:p-7">
          <div className="max-w-4xl mx-auto space-y-4">
            {activeTab === "home"       && <HomeTab      onNav={navigate} />}
            {activeTab === "wizard"     && <WizardTab />}
            {activeTab === "checklist"  && <ChecklistTab />}
            {activeTab === "calculator" && <CalculatorTab />}
            {activeTab === "apostille"  && <ApostilleTab />}
            {activeTab === "neis"       && <NeisTab />}
            {activeTab === "qna"        && <QnaTab />}
          </div>
        </main>

        {/* ── 모바일 하단 탭바 — 7탭 가로 스크롤 ── */}
        <nav className="lg:hidden flex-shrink-0 bg-white border-t border-gray-200 shadow-[0_-2px_8px_rgba(0,0,0,0.06)]">
          <div className="flex overflow-x-auto tab-scroll">
            {TABS.map(({ id, Icon }) => {
              const labels = { home:"홈", wizard:"판별기", checklist:"서류", calculator:"학년계산", apostille:"아포스티유", neis:"NEIS", qna:"Q&A" };
              const isActive = activeTab === id;
              return (
                <button key={id} onClick={() => navigate(id)}
                  className={`relative flex-shrink-0 flex flex-col items-center justify-center py-2 px-3 gap-0.5 transition-colors min-w-[56px]
                    ${isActive ? "text-blue-700" : "text-gray-400"}`}>
                  <Icon size={18} />
                  <span className={`text-[13px] font-semibold whitespace-nowrap ${isActive ? "text-blue-700" : "text-gray-400"}`}>
                    {labels[id]}
                  </span>
                  {isActive && <span className="absolute bottom-0 left-1/2 -translate-x-1/2 w-6 h-0.5 bg-blue-600 rounded-t-full" />}
                </button>
              );
            })}
          </div>
        </nav>

      </div>
    </div>
  );
}

// ╔══════════════════════════════════════════════════════╗
// ║  홈 탭                                               ║
// ╚══════════════════════════════════════════════════════╝
function HomeTab({ onNav }) {

  ];
  return (
    <>
      {/* 환영 배너 */}
      <div className="bg-gradient-to-br from-blue-900 to-blue-600 rounded-2xl p-5 sm:p-7 text-white shadow-lg">
        <div className="flex items-start gap-3">
          <GraduationCap size={26} className="text-yellow-300 flex-shrink-0 mt-0.5" />
          <div>
            <h3 className="text-base sm:text-xl font-black mb-1.5 leading-snug">외국 국적 학생 학적 업무,<br className="sm:hidden" /> 핵심만 정확하게!</h3>
            <p className="text-blue-100 text-sm sm:text-sm leading-relaxed">
              국내 거주 모든 외국 국적 아동(미등록 이주아동·난민 포함)은 초등 의무교육 대상입니다.
              입교·서류 검토·나이스 입력을 빠르고 정확하게 처리하세요.
            </p>
          </div>
        </div>
      </div>

      {/* 빠른 기능 카드 */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        {cards.map(({ id, Icon, bg, ic, border, title, desc }) => (
          <button key={id} onClick={() => onNav(id)}
            className={`bg-white p-3 sm:p-4 rounded-xl border ${border} shadow-sm text-left card-lift`}>
            <div className={`w-9 h-9 ${bg} rounded-xl flex items-center justify-center ${ic} mb-2.5`}>
              <Icon size={17} />
            </div>
            <h4 className="font-bold text-gray-800 text-sm sm:text-sm mb-1 leading-snug">{title}</h4>
            <p className="text-[12px] text-gray-400 leading-relaxed">{desc}</p>
          </button>
        ))}

// 외국학제 → 한국학제 환산 데이터
// 각 학제별: [초등 연한(년), 중학 연한(년), 고등 연한(년)]
// 교육연한(학기) = 연한 × 2
const FOREIGN_SYSTEMS = [
  {
    id: "5-3-4",
    label: "5 - 3 - 4 - 4제",
    desc: "미국·영국·호주 등",
    elem: 5, mid: 3, high: 4,
    note: "대표적인 영미권 학제",

    desc: "일본·중국·동남아 일부",

    note: "일본·중국이 대표적",
  },
  {
    id: "6-3-2",
    label: "6 - 3 - 2 - 5제",
    desc: "러시아·중앙아시아 등",
    elem: 6, mid: 3, high: 2,
    note: "구소련권 국가 학제",
  },
  {
    id: "2-4-3-4",
    label: "2 - 4 - 3 - 4 - 3제",
    desc: "일부 아프리카·중동",
    elem: 6, mid: 3, high: 4,  // 초등 2+4=6년으로 통합
    note: "초등이 2+4년 구조",
  },
  {
    id: "8-4",
    label: "8 - 4 - 4제",
    desc: "일부 유럽·아프리카",
    elem: 8, mid: 0, high: 4,  // 초등 8년 (중·고 통합 4년)
    note: "초등이 8년으로 긴 학제",
  },
];

// 한국학제: 초등 12학기(6년), 중학 6학기(3년), 고등 6학기(3년)
const KR = { elemSem: 12, midSem: 6, highSem: 6 };

function semToGradeInfo(completedSem) {
  // 어느 교급·학년에 해당하는지 반환
  if (completedSem < KR.elemSem) {
    const grade = Math.floor(completedSem / 2) + 1;
    return { school: "초등학교", grade: Math.min(grade, 6), sem: completedSem };
  }
  const afterElem = completedSem - KR.elemSem;
  if (afterElem < KR.midSem) {
    const grade = Math.floor(afterElem / 2) + 1;
    return { school: "중학교", grade: Math.min(grade, 3), sem: completedSem };
  }
  const afterMid = afterElem - KR.midSem;
  if (afterMid < KR.highSem) {
    const grade = Math.floor(afterMid / 2) + 1;
    return { school: "고등학교", grade: Math.min(grade, 3), sem: completedSem };
  }
  return { school: "고등학교 졸업 이상", grade: null, sem: completedSem };
}

// 환산표 데이터 — CalculatorTab 외부 상수
const TABLE_ROWS = [
  { label: "5 - 3 - 4 - 4제", elem: "5년", mid: "3년", high: "4년",          ex: "미국·영국·호주" },
  { label: "6 - 4 - 3 - 3제", elem: "6년", mid: "4년", high: "3년",          ex: "일본·중국" },
  { label: "6 - 3 - 2 - 5제", elem: "6년", mid: "3년", high: "2년",          ex: "러시아·중앙아" },
  { label: "2-4-3-4-3제",      elem: "6년(2+4)", mid: "3년", high: "4년",   ex: "아프리카·중동 일부" },
  { label: "8 - 4 - 4제",      elem: "8년", mid: "—",  high: "4년(중·고통합)", ex: "유럽·아프리카 일부" },
];
const KR_ROW = { label: "한국학제 (기준)", elem: "6년(12학기)", mid: "3년(6학기)", high: "3년(6학기)" };

function CalculatorTab() {
  const [mode, setMode] = useState("doc");   // "doc" | "nodoc"
  const [sysId, setSysId] = useState("5-3-4");
  const [sems, setSems] = useState("");
  const [birth, setBirth] = useState("");
  const [result, setResult] = useState(null);
  const [showTable, setShowTable] = useState(false);

  const selectedSys = FOREIGN_SYSTEMS.find(s => s.id === sysId);

  const calculate = () => {
    const n = parseInt(sems);
    if (isNaN(n) || n < 0) { alert("이수 학기 수를 올바르게 입력해주세요."); return; }

    // 해당 학제에서 이수한 학기를 한국학제 학기로 환산
    const sys = selectedSys;
    // 각 교급별 학기
    const elemSemForeign = sys.elem * 2;
    const midSemForeign  = sys.mid  * 2;

    let krSem = 0;
    if (n <= elemSemForeign) {
      // 초등 범위: 외국 초등 학기 → 한국 초등 비율 환산
      krSem = Math.round((n / (sys.elem * 2)) * KR.elemSem);
    } else if (n <= elemSemForeign + midSemForeign) {
      // 중학 범위
      const midDone = n - elemSemForeign;
      const midSemForeignTotal = sys.mid * 2 || 1;
      krSem = KR.elemSem + Math.round((midDone / midSemForeignTotal) * KR.midSem);
    } else {
      // 고등 범위
      const highDone = n - elemSemForeign - midSemForeign;
      const highSemForeignTotal = sys.high * 2 || 1;
      krSem = KR.elemSem + KR.midSem + Math.round((highDone / (highSemForeignTotal)) * KR.highSem);
    }

    const info = semToGradeInfo(krSem);

    // 1학기 부족 판정 (초·중학교, 외국→국내 공백 없는 경우 적용 가능)
    const shortOneSem = (krSem % 2 === 1); // 홀수 학기 = 정확히 반 학기 부족
    const flexApplicable = (info.school === "초등학교" || info.school === "중학교");

    // 연령 기준 (참고용)
    let ageInfo = null;
    if (birth) {
      const age = 2026 - new Date(birth).getFullYear();
      const ageGrade = Math.min(Math.max(age - 6, 1), 6);
      ageInfo = { age, ageGrade };
    }

    setResult({ info, krSem, n, shortOneSem, flexApplicable, ageInfo, sys });
  };

  const reset = () => { setSems(""); setBirth(""); setResult(null); };

  return (
    <div className="space-y-4">
      {/* 모드 선택 */}
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <button onClick={() => { setMode("doc"); setResult(null); }}
          className={`p-4 rounded-xl border-2 text-left transition-all ${mode === "doc"
            ? "border-indigo-500 bg-indigo-50"
            : "border-gray-200 bg-white hover:border-gray-300"}`}>
          <div className={`text-sm font-bold mb-1 ${mode === "doc" ? "text-indigo-800" : "text-gray-700"}`}>
            📄 학력증빙서류가 있는 경우
          </div>
          <p className="text-sm text-gray-500">재학증명서·성적증명서로 외국 학제 기반 학년 산정</p>
        </button>
        <button onClick={() => { setMode("nodoc"); setResult(null); }}
          className={`p-4 rounded-xl border-2 text-left transition-all ${mode === "nodoc"
            ? "border-orange-500 bg-orange-50"
            : "border-gray-200 bg-white hover:border-gray-300"}`}>
          <div className={`text-sm font-bold mb-1 ${mode === "nodoc" ? "text-orange-800" : "text-gray-700"}`}>
            ❓ 학력 증명이 곤란한 경우
          </div>
          <p className="text-sm text-gray-500">시도교육청 학력심의위원회 통한 학력 인정 및 학년 결정</p>
        </button>
      </div>

      {/* 학력 증명 곤란 안내 */}
      {mode === "nodoc" && (
        <div className="bg-orange-50 border border-orange-200 rounded-xl p-5 space-y-3">
          <h4 className="font-bold text-orange-800 text-sm flex items-center gap-2">
            <AlertCircle size={15} />학력 증명이 곤란한 경우 처리 절차
          </h4>
          <div className="space-y-2 text-sm text-orange-800">
            <div className="bg-white/70 rounded-lg p-3 border border-orange-200">
              <p className="font-semibold mb-1">① 시도교육청 학력심의위원회 심의</p>
              <p className="text-orange-700">학력증빙서류를 제출하지 못하는 경우, 시도교육청별 학력심의위원회에서 학력 인정 및 학년 결정 (각 시도교육청별 상이하므로 교육청에 문의)</p>
            </div>
            <div className="bg-white/70 rounded-lg p-3 border border-orange-200">
              <p className="font-semibold mb-1">② 학교 자체 학력인정 심의</p>
              <p className="text-orange-700">학력증빙서류 없이도 학력인정이 가능한 학교의 경우 해당 학교 학력 심의를 통해 학력 인정 및 학년 결정</p>
            </div>
            <div className="bg-amber-100 rounded-lg p-3 border border-amber-300 mt-1">
              <p className="font-semibold text-amber-800">📌 유의사항</p>
              <p className="text-amber-700 mt-0.5">사이버학습, 가정 내 학습 기간 중 국내에서 1개월 이상 거주하거나 해당 기간의 성적을 증명할 수 없는 경우에는 외국 학교 교육기간으로 인정하지 않습니다.</p>
            </div>
          </div>
        </div>
      )}

      {mode === "doc" && (

              className="w-full flex justify-between items-center px-5 py-3.5 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
              <span>📊 외국학제 → 한국학제 환산표</span>
              <span className="text-gray-400 text-sm">{showTable ? "▲ 접기" : "▼ 펼쳐보기"}</span>
            </button>
            {showTable && (
              <div className="px-4 pb-4 overflow-x-auto -mx-1">
                <div className="min-w-[480px]">
                <table className="w-full text-sm border-collapse">
                  <thead>
                    <tr className="bg-indigo-50">
                      <th className="border border-gray-200 px-3 py-2 text-left text-gray-700 font-semibold">학제</th>
                      <th className="border border-gray-200 px-3 py-2 text-center text-indigo-700 font-semibold">초등</th>
                      <th className="border border-gray-200 px-3 py-2 text-center text-green-700 font-semibold">중학</th>

                      <tr key={i} className="hover:bg-blue-50">
                        <td className="border border-gray-200 px-3 py-2 font-medium text-gray-800">{r.label}</td>
                        <td className="border border-gray-200 px-3 py-2 text-center text-indigo-600">{r.elem}</td>
                        <td className="border border-gray-200 px-3 py-2 text-center text-green-600">{r.mid}</td>
                        <td className="border border-gray-200 px-3 py-2 text-center text-purple-600">{r.high}</td>
                        <td className="border border-gray-200 px-3 py-2 text-gray-500">{r.ex}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <p className="text-sm text-gray-400 mt-2">※ 외국학교 재학증명서·성적증명서를 근거로 한국학제(12학년제)에 맞춰 계산합니다.</p>
                </div>
              </div>
            )}
          </div>

          {/* 입력 폼 */}
          <div className="bg-white p-4 sm:p-5 rounded-xl border border-gray-200 shadow-sm">
            <h3 className="text-sm sm:text-sm font-bold text-gray-800 mb-4 flex items-center gap-2">
              <Calculator size={14} className="text-indigo-600" />학년 산정 계산기
            </h3>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
              <div className="space-y-4">
                {/* 학제 선택 */}
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">출신국 학제 선택</label>
                  <select value={sysId} onChange={e => { setSysId(e.target.value); setResult(null); }}
                    className="w-full border border-gray-300 rounded-lg p-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-indigo-400 outline-none">
                    {FOREIGN_SYSTEMS.map(s => (
                      <option key={s.id} value={s.id}>{s.label} ({s.desc})</option>
                    ))}
                  </select>
                  {selectedSys && (
                    <p className="text-sm text-indigo-600 mt-1 ml-1">
                      초등 {selectedSys.elem}년 / 중학 {selectedSys.mid}년 / 고등 {selectedSys.high}년
                    </p>
                  )}
                </div>

                {/* 이수 학기 */}
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">외국 학교 총 이수 학기 수</label>
                  <input type="number" min="0" max="30"
                    placeholder="예: 4학기 이수 → 4"
                    value={sems} onChange={e => { setSems(e.target.value); setResult(null); }}
                    className="w-full border border-gray-300 rounded-lg p-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-indigo-400 outline-none" />
                  <p className="text-sm text-gray-400 mt-1 ml-1">1학기 = 6개월 / 1학년 = 2학기</p>
                </div>

                {/* 생년월일 (선택) */}
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">
                    생년월일 <span className="font-normal text-gray-400">(선택 — 연령 참고용)</span>
                  </label>
                  <input type="date" value={birth} onChange={e => { setBirth(e.target.value); setResult(null); }}
                    className="w-full border border-gray-300 rounded-lg p-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-indigo-400 outline-none" />
                </div>

                <div className="flex gap-2">
                  <button onClick={calculate}
                    className="flex-1 bg-indigo-600 text-white rounded-lg py-2.5 font-semibold hover:bg-indigo-700 transition-colors text-sm shadow-sm">
                    학년 계산하기
                  </button>
                  {result && (
                    <button onClick={reset}
                      className="px-3 py-2.5 border border-gray-300 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
                      <RotateCcw size={14} />
                    </button>
                  )}
                </div>
              </div>

              {/* 결과 */}
              <div className="bg-gray-50 p-5 rounded-xl border border-dashed border-gray-300 flex items-center justify-center min-h-[220px]">
                {!result ? (
                  <div className="text-center text-gray-400">
                    <Calculator size={36} className="mx-auto mb-2 opacity-30" />
                    <p className="text-sm">정보를 입력하고 계산하세요.</p>
                  </div>
                ) : (
                  <div className="w-full space-y-3">
                    <div>
                      <span className="text-sm font-bold text-indigo-500 uppercase tracking-wider">배정 권장 학년</span>
                      <h4 className="text-2xl font-black text-gray-900 mt-0.5">
                        {result.info.school}{result.info.grade ? ` ${result.info.grade}학년` : ""}
                      </h4>
                    </div>

                    <div className="space-y-1.5 text-sm text-gray-600">
                      <p>• 외국 이수: <strong>{result.n}학기</strong>
                        {" → "}학제 환산 후 <strong>{result.krSem}학기</strong>
                      </p>
                      <p>• 적용 학제: <strong>{result.sys.label}</strong></p>
                      {result.ageInfo && (
                        <p>• 연령 참고: 만 <strong>{result.ageInfo.age}세</strong> (초등 {result.ageInfo.ageGrade}학년 연령)</p>
                      )}
                    </div>

                    {/* 1학기 부족 허용 안내 */}
                    {result.shortOneSem && result.flexApplicable && (
                      <div className="bg-blue-50 border border-blue-200 rounded-lg p-2.5 text-sm text-blue-800">
                        <p className="font-semibold">📌 1학기(6개월) 부족 특례 해당</p>
                        <p className="mt-0.5">학제 차이로 한 학기가 부족하지만, 외국학교에서 국내 학교로 <strong>공백 없이 연속 취학</strong>하는 경우 학교장 판단에 따라 상위 학년 배정이 가능합니다.</p>
                      </div>
                    )}

                    {/* 졸업학력 인정 조건 */}
                    {result.info.school === "고등학교 졸업 이상" && (
                      <div className="bg-green-50 border border-green-200 rounded-lg p-2.5 text-sm text-green-800">
                        <p className="font-semibold">🎓 졸업학력 인정 가능</p>
                        <p className="mt-0.5">외국 정규교육기관에서 총 재학기간을 만족하며 수료·졸업한 경우 졸업학력으로 인정합니다.</p>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* 인정 기준 요약 */}
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
            <h4 className="text-sm font-bold text-gray-700 mb-3">📌 외국 학교교육과정 인정 기준</h4>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm mb-3">
              {[
                { school: "초등학교 과정", range: "외국학교 1~6학년 과정", box: "bg-indigo-50 border-indigo-200", title: "text-indigo-800", text: "text-indigo-600" },
                { school: "중학교 과정",   range: "외국학교 7~9학년 과정",  box: "bg-green-50 border-green-200", title: "text-green-800", text: "text-green-600" },
                { school: "고등학교 과정", range: "외국학교 10~12학년 과정",box: "bg-purple-50 border-purple-200", title: "text-purple-800", text: "text-purple-600" },
              ].map(({ school, range, box, title, text }) => (
                <div key={school} className={`${box} border rounded-lg p-3`}>
                  <p className={`font-bold ${title}`}>{school}</p>
                  <p className={`${text} mt-0.5`}>{range}</p>
                </div>
              ))}
            </div>
            <div className="space-y-1.5 text-sm text-gray-600">
              <p>• <strong>인정 대상:</strong> 국내가 아닌 <strong>외국에 소재하는 학교</strong> (국내 소재 외국인 학교 제외)</p>
              <p>• <strong>인정 기준:</strong> 우리나라 학제(학기 단위)에 따른 교급별 교육과정상 교육 연한</p>
              <p>• <strong>최소 이수:</strong> 외국 정규학교 이수기간은 최소 6개월(한 학기) 이상인 경우에 인정</p>
              <p>• <strong>졸업학력:</strong> 사이버학습·가정 내 학습은 국내 1개월 이상 거주하거나 성적 증명 불가 시 제외</p>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

  const [status, setStatus] = useState("idle"); // idle | loading | done | error
  const [result, setResult] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");
  const [history, setHistory] = useState([]);

  const doSearch = useCallback(async (query) => {
    if (!query.trim()) return;
    setStatus("loading");
    setResult(null);
    setErrorMsg("");

    try {
      // 1단계: REST Countries API로 국가명 정규화 및 alpha-2 코드 취득
      const searchTerm = KO_EN_HINTS[query.trim()] || query.trim();
      const apiUrl = `https://restcountries.com/v3.1/name/${encodeURIComponent(searchTerm)}?fields=name,cca2,flag,translations`;

      const resp = await fetch(apiUrl);
      if (!resp.ok) {
        if (resp.status === 404) throw new Error(`"${query}"에 해당하는 국가를 찾을 수 없습니다. 다른 국가명으로 시도해보세요.`);
        throw new Error(`국가 정보 조회 실패 (HTTP ${resp.status})`);
      }

      const list = await resp.json();
      if (!Array.isArray(list) || list.length === 0) {
        throw new Error(`"${query}"에 해당하는 국가를 찾을 수 없습니다.`);
      }

      // 정확히 일치하는 국가 우선 선택
      const exact = list.find(c =>
        c.name.common.toLowerCase() === searchTerm.toLowerCase() ||
        (c.translations?.kor?.common || "").toLowerCase() === query.trim().toLowerCase()
      );
      const matched = exact || list[0];

      const cca2 = matched.cca2;
      const nameEn = matched.name.common;
      const nameKo = matched.translations?.kor?.common || query;
      const flag = matched.flag || "";

      // 2단계: 자체 APOSTILLE_DB 조회
      const dbEntry = APOSTILLE_DB[cca2] || null;
      const isMember = !!dbEntry;

      // 홍콩/마카오 특수 처리: 중국(CN) 입력 시 안내
      let note = dbEntry?.note || null;
      if (cca2 === "CN" && !isMember) {
        note = "중국 본토는 미가입국입니다. 홍콩(HK) 또는 마카오(MO)는 별도 가입되어 있으니 해당 지역 발급 서류인지 확인하세요.";
      }

      setResult({
        country_ko: nameKo,
        country_en: nameEn,
        flag,
        cca2,
        is_member: isMember,
        join_date: dbEntry?.joined || null,
        note,
        search_date: new Date().toISOString().split("T")[0],
      });
      setStatus("done");

      const label = nameKo || query;
      setHistory(h => [label, ...h.filter(x => x !== label)].slice(0, 8));
    } catch (e) {
      setErrorMsg(e.message || "알 수 없는 오류");
      setStatus("error");
    }
  }, []);

  const handleSubmit = () => doSearch(country);

  return (
    <>
      {/* 개요 배너 */}
      <div className="bg-gradient-to-r from-rose-600 to-orange-500 rounded-2xl p-4 sm:p-5 text-white shadow-md">
        <h3 className="text-base sm:text-lg font-bold mb-1 flex items-center gap-2"><Stamp size={17} />아포스티유 협약국 확인</h3>
        <p className="text-rose-100 text-sm sm:text-sm leading-relaxed">
          국가명(한국어·영어)을 입력하면 HCCH 협약 가입 여부를 즉시 확인합니다.
          <strong> 방법 2(아포스티유)</strong> 또는 <strong>방법 3(영사확인)</strong> 중 어느 서류 처리가 필요한지 안내합니다.
        </p>
      </div>

      {/* 흐름도 */}
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4 sm:p-5">
        <h4 className="font-bold text-gray-700 mb-3 text-sm sm:text-sm">📋 외국 학력서류 인증 흐름</h4>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 text-sm">
          {[
            { box: "bg-blue-50 border-blue-200", badgeClass: "bg-blue-600", titleClass: "text-blue-800", subClass: "text-blue-500", badge: "방법 1", title: "교육부 홈페이지", sub: "학력인정학교 목록" },
            { box: "bg-rose-50 border-rose-200", badgeClass: "bg-rose-600", titleClass: "text-rose-800", subClass: "text-rose-500", badge: "방법 2", title: "아포스티유 (협약국)", sub: "권한기관 아포스티유" },
            { box: "bg-amber-50 border-amber-200", badgeClass: "bg-amber-600", titleClass: "text-amber-800", subClass: "text-amber-500", badge: "방법 3", title: "영사확인 (미가입국)", sub: "재외공관 영사 인증" },
            { box: "bg-gray-50 border-gray-200", badgeClass: "bg-gray-600", titleClass: "text-gray-800", subClass: "text-gray-500", badge: "방법 4", title: "직접 소명", sub: "정규교육기관 소명" },
          ].map(({ box, badgeClass, titleClass, subClass, badge, title, sub }) => (
            <div key={badge} className={`${box} border rounded-lg p-2.5 text-center`}>
              <span className={`inline-block ${badgeClass} text-white text-[12px] font-bold px-1.5 py-0.5 rounded mb-1`}>{badge}</span>
              <p className={`font-semibold ${titleClass} text-[13px] sm:text-sm leading-snug`}>{title}</p>
              <p className={`${subClass} text-[12px] mt-0.5 hidden sm:block`}>{sub}</p>
            </div>
          ))}
        </div>
      </div>

      {/* 검색 카드 */}
      <div className="bg-white p-4 sm:p-6 rounded-xl border border-gray-200 shadow-sm">
        <h3 className="text-sm sm:text-base font-bold mb-0.5 text-gray-800 flex items-center gap-2"><Search size={15} />국가별 협약 가입 여부 조회</h3>
        <p className="text-sm text-gray-400 mb-2">한국어 또는 영어 국가명을 입력하세요. 내장 데이터로 즉시 조회됩니다.</p>
        <div className="flex items-start gap-1.5 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 mb-4">
          <AlertCircle size={13} className="text-amber-500 flex-shrink-0 mt-0.5" />
          <p className="text-sm text-amber-700">내장 데이터는 <strong>2026년 5월 기준</strong>으로 작성되었습니다. 이후 신규 가입국이 생길 수 있으므로, 최신 현황은 <a href="https://www.apostille.go.kr" target="_blank" rel="noreferrer" className="underline font-semibold">외교부 아포스티유 홈페이지</a>에서 추가 확인하시기 바랍니다.</p>
        </div>

        <div className="flex gap-2 mb-3">
          <input
            type="text"
            value={country}
            onChange={e => setCountry(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleSubmit()}
            placeholder="예: 베트남, 중국, 몽골, Bangladesh, Philippines..."
            className="flex-1 border border-gray-300 rounded-lg px-3 sm:px-4 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-rose-400 outline-none min-w-0"
          />
          <button
            onClick={handleSubmit}
            disabled={status === "loading"}
            className="bg-rose-600 text-white px-4 sm:px-5 py-2.5 rounded-lg font-semibold hover:bg-rose-700 active:scale-95 transition-all text-sm shadow-sm flex items-center gap-1.5 disabled:opacity-60 whitespace-nowrap flex-shrink-0"
          >
            {status === "loading"
              ? <><Loader2 size={14} className="animate-spin" /><span className="hidden sm:inline">조회 중</span></>
              : <><Search size={14} /><span className="hidden sm:inline">조회하기</span><span className="sm:hidden">조회</span></>}
          </button>
        </div>

        {/* 빠른 참조 국가 */}
        <div className="flex flex-wrap gap-1.5 mb-4">
          {["베트남","중국","필리핀","인도네시아","몽골","미국","방글라데시","캄보디아","태국","일본","러시아","카자흐스탄","우즈베키스탄"].map(c => (
            <button key={c} onClick={() => { setCountry(c); doSearch(c); }}
              className={`text-sm px-2.5 py-1 rounded-full border transition-colors
                ${history.includes(c)
                  ? "bg-rose-50 text-rose-700 border-rose-200 hover:bg-rose-100"
                  : "bg-gray-50 text-gray-600 border-gray-200 hover:bg-gray-100"}`}>
              {c}
            </button>
          ))}
        </div>

        {/* 최근 조회 기록 */}
        {history.length > 0 && (
          <div className="mb-4">
            <p className="text-[12px] text-gray-400 mb-1.5">최근 조회</p>
            <div className="flex flex-wrap gap-1.5">
              {history.map(h => (
                <button key={h} onClick={() => { setCountry(h); doSearch(h); }}
                  className="text-sm bg-rose-50 hover:bg-rose-100 text-rose-700 px-3 py-1 rounded-full border border-rose-200 transition-colors flex items-center gap-1">
                  <span>🕐</span>{h}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* 로딩 */}
        {status === "loading" && (
          <div className="text-center py-8 text-gray-400">
            <Loader2 size={32} className="mx-auto mb-2 animate-spin text-rose-400" />
            <p className="text-sm">국가 정보를 조회 중입니다...</p>
          </div>
        )}

        {/* 에러 */}
        {status === "error" && (
          <div className="p-4 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 flex items-start gap-2">
            <AlertCircle size={16} className="flex-shrink-0 mt-0.5" />
            <div>
              <p className="font-semibold">조회 실패</p>
              <p className="text-sm mt-0.5">{errorMsg}</p>
              <p className="text-sm text-red-500 mt-1">영어 국가명으로 다시 시도하거나, 국가명 힌트 버튼을 활용해보세요.</p>
            </div>
          </div>
        )}

        {/* 결과 */}
        {status === "done" && result && <ApostilleResult info={result} />}
      </div>

      {/* 확인서 양식 안내 */}
      <div className="bg-white p-4 sm:p-5 rounded-xl border border-gray-200 shadow-sm">
        <h4 className="font-bold text-gray-800 mb-3 text-sm sm:text-sm flex items-center gap-2">
          <FileText size={13} className="text-rose-500" />아포스티유 확인서 주요 기재사항
        </h4>
        <div className="grid grid-cols-3 gap-1.5 sm:gap-2 text-sm">
          {APOSTILLE_ITEMS.map(({ num, label }) => (
            <div key={num} className="bg-gray-50 rounded-lg p-2.5 border flex items-center gap-2">
              <span className="w-5 h-5 bg-rose-100 text-rose-700 rounded-full flex items-center justify-center font-bold text-[12px] flex-shrink-0">{num}</span>
              <span className="text-gray-700 font-medium">{label}</span>
            </div>
          ))}
        </div>
        <p className="text-sm text-gray-400 mt-3">※ 아포스티유는 원칙적으로 문서 '원문' 대상. 번역문은 공증사무소 '공증' 후 권한기관에 별도 아포스티유 신청 필요.</p>
        <div className="mt-2 flex gap-4">
          <a href="https://www.apostille.go.kr" target="_blank" rel="noreferrer" className="text-sm text-rose-600 hover:underline flex items-center gap-1">
            <ExternalLink size={11} />외교부 아포스티유 홈페이지
          </a>
          <a href="https://www.oka.go.kr" target="_blank" rel="noreferrer" className="text-sm text-blue-600 hover:underline flex items-center gap-1">
            <ExternalLink size={11} />재외동포청 홈페이지
          </a>
        </div>
      </div>

      {/* 증명서 검증 */}
      <a
        href="https://www.apostille.go.kr/index.do"
        target="_blank"
        rel="noreferrer"
        className="flex items-center justify-between bg-white hover:bg-rose-50 active:scale-[0.99] transition-all border border-rose-200 rounded-xl p-4 sm:p-5 shadow-sm group"
      >
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 bg-rose-100 rounded-xl flex items-center justify-center flex-shrink-0 group-hover:bg-rose-200 transition-colors">
            <CheckCircle2 size={20} className="text-rose-600" />
          </div>
          <div>
            <p className="font-bold text-sm text-gray-800 group-hover:text-rose-700 transition-colors">아포스티유 증명서 검증</p>
            <p className="text-sm text-gray-500 mt-0.5">외교부 공식 사이트에서 발급된 아포스티유의 진위를 확인합니다</p>
          </div>
        </div>
        <ExternalLink size={16} className="text-rose-400 flex-shrink-0 ml-3 group-hover:text-rose-600 transition-colors" />
      </a>
    </>
  );
}

function ApostilleResult({ info }) {
  const ok = info.is_member;
  return (
    <div className={`rounded-xl border p-4 sm:p-5 mt-3 ${ok ? "bg-emerald-50 border-emerald-300" : "bg-amber-50 border-amber-300"}`}>
      {/* 헤더 */}
      <div className="flex items-center gap-3 mb-3">
        {ok
          ? <CheckCircle2 size={28} className="text-emerald-500 flex-shrink-0" />
          : <XCircle     size={28} className="text-amber-500 flex-shrink-0" />}
        <div className="min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            {info.flag && <span className="text-2xl leading-none">{info.flag}</span>}
            <h4 className={`text-lg sm:text-xl font-black ${ok ? "text-emerald-800" : "text-amber-800"}`}>
              {info.country_ko || "—"}
            </h4>
            {info.country_en && (
              <span className="text-sm sm:text-sm text-gray-500">({info.country_en})</span>
            )}
            {info.cca2 && (
              <span className="text-[12px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded font-mono">{info.cca2}</span>
            )}
          </div>
          <span className={`inline-block mt-1 px-2.5 py-0.5 rounded-full text-sm sm:text-sm font-bold ${ok ? "bg-emerald-100 text-emerald-800" : "bg-amber-100 text-amber-800"}`}>
            {ok ? "✅ 아포스티유 협약 가입국" : "❌ 아포스티유 협약 미가입국"}
          </span>
        </div>
      </div>

      {/* 상세 정보 */}
      {(info.join_date || info.search_date) && (
        <div className="flex flex-wrap gap-x-5 gap-y-1 text-sm text-gray-600 mb-3">
          {info.join_date && <span><strong>협약 가입일:</strong> {info.join_date}</span>}
          {info.search_date && <span className="text-gray-400">조회일: {info.search_date}</span>}
        </div>
      )}
      {info.note && (
        <div className="bg-white/70 border rounded-lg p-2.5 text-sm text-gray-700 mb-3 flex items-start gap-1.5">
          <span className="flex-shrink-0">⚠️</span>
          <span>{info.note}</span>
        </div>
      )}

      {/* 처리 방법 */}
      {ok ? (
        <div className="bg-emerald-100 border border-emerald-200 rounded-lg p-4">
          <span className="bg-emerald-700 text-white text-sm font-bold px-2 py-0.5 rounded inline-block mb-2">[방법 2] 아포스티유 인증</span>
          <ul className="text-sm text-emerald-800 space-y-1 list-disc list-inside">
            <li>해당 국가의 권한기관에서 <strong>아포스티유가 부착된 서류</strong>를 발급받아 제출</li>
            <li>번역문이 필요한 경우 공증사무소 '공증' 후 별도로 아포스티유 신청</li>
            <li>협약국 권한기관 확인: apostille.go.kr → [서비스 안내] → [아포스티유 제도 소개] → '가입국 현황'</li>
          </ul>
        </div>
      ) : (
        <div className="bg-amber-100 border border-amber-200 rounded-lg p-4">
          <span className="bg-amber-700 text-white text-sm font-bold px-2 py-0.5 rounded inline-block mb-2">[방법 3] 영사확인 (Legalization)</span>
          <ul className="text-sm text-amber-800 space-y-1 list-disc list-inside">
            <li>아포스티유 협약 미가입국이므로 <strong>대한민국 재외공관 영사의 인증</strong>이 필요</li>
            <li>해당 국가 내 대한민국 대사관·영사관에서 문서 영사확인 신청</li>
            <li>문의: 외교부(mofa.go.kr) 또는 해당국 주재 한국 대사관</li>
          </ul>
        </div>
      )}

      <p className="text-[12px] text-gray-400 mt-3 flex items-center gap-1">
        <span>📊</span>
        <span>HCCH 자체 내장 데이터 · REST Countries API 국가명 조회 · 최종 확인은 <a href="https://www.apostille.go.kr" target="_blank" rel="noreferrer" className="underline">apostille.go.kr</a>에서 하세요.</span>
      </p>
    </div>
  );
}

const ALL_QNA_ITEMS = QNA_DATA.flatMap(cat =>
  cat.items.map(item => ({ ...item, cat: cat.cat, color: cat.color }))
);

function QnaTab() {
  const [search, setSearch] = useState("");
  const [activeCat, setActiveCat] = useState("전체");
  const [openKey, setOpenKey] = useState(null); // 안정적 키로 관리 (인덱스 X)

  const cats = ["전체", ...QNA_DATA.map(c => c.cat)];

  const filtered = ALL_QNA_ITEMS.filter(item => {
    const matchCat = activeCat === "전체" || item.cat === activeCat;
    const kw = search.trim().toLowerCase();
    const matchSearch = !kw ||
      item.q.toLowerCase().includes(kw) ||
      item.a.join(" ").toLowerCase().includes(kw) ||
      item.tag.toLowerCase().includes(kw);
    return matchCat && matchSearch;
  });

  const getKey = (item) => `${item.cat}-${item.q.slice(0, 20)}`;
  const toggle = (item) => setOpenKey(prev => prev === getKey(item) ? null : getKey(item));

  return (
    <div className="space-y-4">
      {/* 헤더 */}
      <div className="bg-gradient-to-r from-teal-600 to-cyan-600 rounded-2xl p-4 sm:p-5 text-white shadow-md">
        <h3 className="text-base sm:text-lg font-bold mb-1 flex items-center gap-2">
          <HelpCircle size={17} />자주 묻는 질문 (Q&A)
        </h3>
        <p className="text-teal-100 text-sm sm:text-sm">외국 국적 학생 학적 관리 현장에서 자주 발생하는 질문 35개를 5개 카테고리로 정리했습니다.</p>
      </div>

      {/* 검색 + 필터 */}
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-3 sm:p-4 space-y-3">
        <div className="relative">
          <Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
          <input
            type="text"
            value={search}
            onChange={e => { setSearch(e.target.value); setOpenKey(null); }}
            placeholder="질문 또는 키워드 검색... (예: 취학, 편입학, 나이스, 예방접종)"
            className="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-teal-400 focus:border-teal-400 outline-none"
          />
          {search && (
            <button onClick={() => { setSearch(""); setOpenKey(null); }} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <XCircle size={15} />
            </button>
          )}
        </div>
        <div className="flex flex-wrap gap-2">
          {cats.map(cat => {
            const catData = QNA_DATA.find(c => c.cat === cat);
            const color = catData ? CAT_COLORS[catData.color] : null;
            const isActive = activeCat === cat;
            return (
              <button key={cat} onClick={() => { setActiveCat(cat); setOpenKey(null); }}
                className={`px-3 py-1 rounded-full text-sm font-semibold border transition-all
                  ${isActive
                    ? color ? `${color.badge} text-white border-transparent` : "bg-gray-700 text-white border-transparent"
                    : "bg-white text-gray-600 border-gray-300 hover:border-gray-400"}`}>
                {cat}
                {cat !== "전체" && (
                  <span className="ml-1 opacity-70">
                    {QNA_DATA.find(c => c.cat === cat)?.items.length}
                  </span>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* 결과 수 */}
      <p className="text-sm text-gray-400 px-1">
        {filtered.length}개 항목 표시 중 (전체 {ALL_QNA_ITEMS.length}개)
      </p>

      {/* Q&A 목록 */}
      {filtered.length === 0 ? (
        <div className="bg-white rounded-xl border border-gray-200 p-10 text-center text-gray-400">
          <HelpCircle size={36} className="mx-auto mb-2 opacity-30" />
          <p className="text-sm">검색 결과가 없습니다. 다른 키워드로 검색해 보세요.</p>
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map((item) => {
            const color = CAT_COLORS[item.color];
            const key = getKey(item);
            const isOpen = openKey === key;
            return (
              <div key={key} className={`bg-white rounded-xl border ${isOpen ? color.border : "border-gray-200"} shadow-sm overflow-hidden transition-all`}>
                <button
                  onClick={() => toggle(item)}
                  className="w-full flex items-start gap-2.5 p-3.5 sm:p-4 text-left hover:bg-gray-50 active:bg-gray-100 transition-colors"
                >
                  <span className={`flex-shrink-0 mt-0.5 px-1.5 py-0.5 rounded text-[13px] sm:text-[12px] font-bold text-white ${color.badge}`}>
                    {item.cat}
                  </span>
                  <span className="flex-1 text-sm sm:text-sm font-semibold text-gray-800 leading-snug">{item.q}</span>
                  <span className={`flex-shrink-0 mt-0.5 ${color.text}`}>
                    {isOpen ? <ChevronUp size={15} /> : <ChevronDown size={15} />}
                  </span>
                </button>

                {isOpen && (
                  <div className={`px-3.5 sm:px-4 pb-3.5 sm:pb-4 border-t ${color.border}`}>
                    <div className={`mt-3 rounded-lg p-3 sm:p-4 ${color.bg} space-y-2`}>
                      {item.a.map((line, i) => (
                        <p key={i} className={`text-sm ${color.text} leading-relaxed ${line.startsWith("※") || line.startsWith("*") ? "opacity-75 italic" : ""}`}>
                          {line}
                        </p>
                      ))}
                    </div>
                    <div className="flex items-center gap-1 mt-2">
                      <Tag size={10} className="text-gray-300" />
                      <span className="text-[12px] text-gray-400">{item.tag}</span>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
